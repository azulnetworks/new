<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Continue</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 24px;
    background: #131019;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    text-align: center;
  }
  .cb-head { font-size: 20px; font-weight: 600; color: #fff; margin: 0; }
  .cb-sub  { font-size: 15px; color: #a39fb0; margin: 0 0 20px; max-width: 320px; line-height: 1.5; }
  .cb-btn {
    width: 100%;
    max-width: 340px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    background: linear-gradient(90deg, #ff8a4c 0%, #f857a6 45%, #a95cf1 100%);
    box-shadow: 0 8px 30px rgba(248, 87, 166, 0.35);
    transition: transform 0.08s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cb-btn:active { transform: scale(0.98); }
  .cb-arrow { font-size: 20px; line-height: 1; }
  .cb-hint { font-size: 13px; color: #6f6b7d; margin: 14px 0 0; min-height: 18px; line-height: 1.4; }
</style>
</head>
<body>

  <p class="cb-head">Almost there</p>
  <p class="cb-sub">For the best experience, continue in your browser.</p>

  <button id="cb-btn" class="cb-btn" type="button">
    Continue in browser
    <span class="cb-arrow">&rarr;</span>
  </button>
  <p id="cb-hint" class="cb-hint"></p>

<script>
(function () {
  'use strict';

  var TARGET = 'https://mobilegamingcentral.com';

  var btn  = document.getElementById('cb-btn');
  var hint = document.getElementById('cb-hint');

  btn.addEventListener('click', function () {
    var ua = navigator.userAgent || '';
    var isAndroid = /Android/i.test(ua);
    var isIOS = /iPhone|iPad|iPod/i.test(ua);

    if (isAndroid) {
      var clean = TARGET.replace(/^https?:\/\//, '');
      window.location.href =
        'intent://' + clean +
        '#Intent;scheme=https;package=com.android.chrome;end';
      setTimeout(function () { window.location.href = TARGET; }, 600);
      return;
    }

    if (isIOS) {
      window.location.href = TARGET;
      hint.textContent = 'If this stays in-app, tap \u22EF then \u201COpen in Browser\u201D.';
      return;
    }

    window.location.href = TARGET;
  });
})();
</script>
</body>
</html>
